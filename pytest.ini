[pytest]
# Pytest Configuration - Speckit Compliance
# QuickRescue Testing Standards

# Test discovery
testpaths = backend/tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=backend/app
    --cov-report=html:htmlcov
    --cov-report=term-missing:skip-covered
    --cov-report=xml

# Markers
markers =
    integration: Integration tests
    unit: Unit tests
    slow: Slow running tests
    smoke: Smoke tests
    security: Security tests
    audit: Audit and compliance tests

