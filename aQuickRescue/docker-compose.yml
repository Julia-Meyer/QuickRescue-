version: '3.8'

# ============================================================================
# aQuickRescue - Local Development Environment
#
# Start: docker-compose up -d
# Stop:  docker-compose down
#
# Services:
# - postgres: PostgreSQL 14 (patient database)
# - fhir-server: HAPI FHIR (health data server)
# - backend-api: FastAPI (aQuickRescue API)
# - adminer: Database UI (optional)
#
# ============================================================================

services:

  # ========================================================================
  # 1. POSTGRESQL DATABASE
  # ========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: aquickrescue-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aquickrescue
      POSTGRES_PASSWORD: dev_password_change_in_production
      POSTGRES_DB: aquickrescue_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      # Initialize database with schema
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      # Persistent data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquickrescue"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aquickrescue-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================================
  # 2. FHIR SERVER (Health Information Exchange)
  # ========================================================================
  fhir-server:
    image: hapiproject/hapi:v6.10.0
    container_name: aquickrescue-fhir
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.server_address: http://fhir-server:8080/fhir
      spring.datasource.url: jdbc:postgresql://postgres:5432/hapi_db
      spring.datasource.username: aquickrescue
      spring.datasource.password: dev_password_change_in_production
      spring.datasource.driver-class-name: org.postgresql.Driver
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/fhir || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aquickrescue-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ========================================================================
  # 3. BACKEND API (FastAPI)
  # ========================================================================
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aquickrescue-api
    ports:
      - "8000:8000"
    environment:
      # Database
      DATABASE_URL: postgresql://aquickrescue:dev_password_change_in_production@postgres:5432/aquickrescue_db

      # FHIR Server
      FHIR_BASE_URL: http://fhir-server:8080/fhir

      # Security
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15

      # CORS
      CORS_ORIGINS: http://localhost:3000,http://localhost:8081

      # Logging
      LOG_LEVEL: DEBUG
    volumes:
      # Live reload for development
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      fhir-server:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - aquickrescue-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ========================================================================
  # 4. ADMINER (Optional - Database UI)
  # ========================================================================
  adminer:
    image: adminer:latest
    container_name: aquickrescue-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - aquickrescue-network
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # ========================================================================
  # 5. REDIS (Optional - for caching, Phase 2+)
  # ========================================================================
  # redis:
  #   image: redis:7-alpine
  #   container_name: aquickrescue-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - aquickrescue-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

  # ========================================================================
  # 6. PROMETHEUS (Optional - Metrics, Phase 2+)
  # ========================================================================
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: aquickrescue-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./backend/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
  #     - prometheus_data:/prometheus
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #   networks:
  #     - aquickrescue-network

networks:
  aquickrescue-network:
    driver: bridge

volumes:
  postgres_data:
  # redis_data:
  # prometheus_data:

# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================

# 1. START ALL SERVICES
# docker-compose up -d

# 2. VIEW LOGS
# docker-compose logs -f backend-api
# docker-compose logs -f postgres
# docker-compose logs -f fhir-server

# 3. EXECUTE COMMANDS IN CONTAINER
# docker-compose exec backend-api pytest              # Run tests
# docker-compose exec backend-api black app/          # Format code
# docker-compose exec backend-api flake8 app/         # Lint code

# 4. ACCESS SERVICES
# API:                          http://localhost:8000
# API Docs (Swagger):           http://localhost:8000/docs
# API Docs (ReDoc):             http://localhost:8000/redoc
# FHIR Server:                  http://localhost:8080/fhir
# Database UI (Adminer):        http://localhost:8081
# Postgres Connection:
#   Host:     localhost
#   Port:     5432
#   User:     aquickrescue
#   Password: dev_password_change_in_production
#   Database: aquickrescue_db

# 5. INITIALIZE TEST DATA
# docker-compose exec postgres psql -U aquickrescue -d aquickrescue_db \
#   -c "INSERT INTO users (username, email, role, hashed_password) VALUES
#   ('test_patient', 'patient@example.com', 'PATIENT', 'hash');"

# 6. STOP ALL SERVICES
# docker-compose down

# 7. CLEAN ALL DATA
# docker-compose down -v

# ============================================================================
# MONITORING & DEBUGGING
# ============================================================================

# Health Check Status
# docker-compose ps

# Database Status
# docker-compose exec -T postgres pg_isready

# API Status
# curl http://localhost:8000/api/v1/health

# FHIR Server Status
# curl http://localhost:8080/fhir/metadata

# ============================================================================
# TROUBLESHOOTING
# ============================================================================

# Q: Postgres connection refused?
# A: Wait 10-15 seconds for container startup, check: docker-compose ps

# Q: FHIR server not responding?
# A: Check FHIR container logs: docker-compose logs fhir-server

# Q: Port already in use?
# A: Change port mapping in docker-compose.yml (8000:8000 → 8001:8000)

# Q: Reset database and start fresh?
# A: docker-compose down -v && docker-compose up -d

